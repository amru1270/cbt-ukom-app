<!DOCTYPE html>
<html>
<head>
  <title>Login</title>

  <!-- ✅ WAJIB -->
  <link rel="stylesheet" href="login.css">

</head>

<body>
<body class="login-page">
<div class="login-container">
  <div class="login-box">
    <h2>Selamat Datang</h2>
    <p>Silakan login untuk melanjutkan, jika belum memiliki akun silahkan isi email dan buat password untuk test kemudian klik daftar</p>

    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">Login</button>
    <button onclick="register()">Daftar</button>
  </div>
</div>

</body>
</html>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase.initializeApp"></script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyAOKU5BpwEK-AtC4nvNWBCChFeNQHLfSbs",
    authDomain: "cbt-ukom-app.firebaseapp.com",
    databaseURL: "https://cbt-ukom-app-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "cbt-ukom-app",
  };

  firebase.initializeApp(firebaseConfig);

  function register() {
    let email = document.getElementById("email").value;
    let pass = document.getElementById("password").value;

    firebase.auth().createUserWithEmailAndPassword(email, pass)
      .then(() => {
        alert("Berhasil daftar, silahkan login menggunakan email dan password yang telah dibuat!");
      })
      .catch(err => alert(err.message));
  }

  function login() {
    let email = document.getElementById("email").value;
    let pass = document.getElementById("password").value;

    firebase.auth().signInWithEmailAndPassword(email, pass)
      .then(() => {
        window.location.href = "index.html";
      })
      .catch(err => alert(err.message));
  }
</script>
